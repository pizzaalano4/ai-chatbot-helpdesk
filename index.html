<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Helpdesk System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <h2>AI Chatbot Helpdesk System</h2>
        <p class="subtitle">Ask your concern below</p>

        <div id="chat-box" class="chat-box">
            <div class="bot-message">
                Hello! How can I help you today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your concern here...">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="footer">
            Helpdesk Contact: helpdesk@example.com
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
